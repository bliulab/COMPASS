program: train.py
method: grid
name: sams_vae_frangieh_IFN-new-iid-0.1-0.3-geneembedding-split-SAMSVAECorrelatedNormalGuide-T
use_wandb: False
metric:
  name: val/IWELBO
  goal: maximize

# Experiment hyperparameters
seed: 0
max_steps: 30000
gradient_clip_norm: 100

# Data module class + hyperparameters
data_module: FrangiehlzarOODCombinationDataModule 
# 1392 
data_module_kwargs.data_path_1: ${COMPASS_DATA_DIR}/RNA_IFN_iid-new.h5ad
data_module_kwargs.data_path_2: ${COMPASS_DATA_DIR}/protein_IFN_iid-new.h5ad
data_module_kwargs.perturbation_embedding_path: ${COMPASS_EMBEDDING_DIR}/P_gene.pt
data_module_kwargs.use_key_rna: X
data_module_kwargs.use_key_adt: X 
data_module_kwargs.filter_gene_by_counts_rna: 1
data_module_kwargs.filter_gene_by_counts_adt: 0
data_module_kwargs.filter_cell_by_counts_rna: 1
data_module_kwargs.filter_cell_by_counts_adt: False
data_module_kwargs.normalize_total_rna: 1000000.0
data_module_kwargs.normalize_total_adt: 1000000.0
data_module_kwargs.result_normed_key_rna: X_normed
data_module_kwargs.result_normed_key_adt: X_normed
data_module_kwargs.log1p_rna: True
data_module_kwargs.log1p_adt: True #False
data_module_kwargs.result_log1p_key_rna: X_log1p
data_module_kwargs.result_log1p_key_adt: X_log1p
data_module_kwargs.subset_hvg_rna: 1200
data_module_kwargs.hvg_flavor_rna: seurat_v3
data_module_kwargs.subset_hvg_adt: 24
data_module_kwargs.hvg_flavor_adt: seurat_v3
data_module_kwargs.frac_combinations_train: 0.5
data_module_kwargs.frac_combinations_test: 0.25
#data_module_kwargs.frac_combination_cells_train: 0.25
data_module_kwargs.split_seed: 1
data_module_kwargs.batch_size: 64
data_module_kwargs.highly_variable_genes_only: True
data_module_kwargs.encode_combos_as_unique: False

# wandb does not provide mechanism to define dependent variables
# in order to tie the value of multiple variables together,
# we will preprocess the config to split variables separated by "--"
# and use the same values for each
model_kwargs.n_latent--guide_kwargs.n_latent: 32
model_kwargs.decoder_n_layers: 4 
model_kwargs.decoder_n_layers_2: 4 

# Model class + hyperparameters
model: SAMSVAEModel
model_kwargs.mask_prior_prob: 0.1
model_kwargs.embedding_prior_scale: 0.3
model_kwargs.likelihood_key: library_nb
model_kwargs.likelihood_key_2: library_nb
model_kwargs.decoder_n_hidden: 64 
model_kwargs.decoder_n_hidden_2: 64
  
# Guide class + hyperparameters
guide: SAMSVAECorrelatedNormalGuide #SAMSVAEMeanFieldNormalGuide #
guide_kwargs.basal_encoder_n_hidden: 64 
guide_kwargs.basal_encoder_input_normalization: log_standardize 
guide_kwargs.embedding_encoder_n_layers: 2 
guide_kwargs.embedding_encoder_n_hidden: 64  
guide_kwargs.mean_field_encoder: True 
guide_kwargs.basal_encoder_n_layers: 4 

# Loss module class + hyperparameters
loss_module:  SAMSVAE_ELBOLossModule

# Lightning module hyperparameters
lightning_module_kwargs.lr: 0.0005
lightning_module_kwargs.n_particles: 5

# Predictor class + hyperparameters (used to evaluation)
predictor: SAMSVAEPredictor
model_kwargs.pert_dim: 512   
model_kwargs.pert_embed_dim: 64
model_kwargs.transition_hidden_dim: 128
guide_kwargs.pert_dim: 512
guide_kwargs.pert_embed_dim: 64
